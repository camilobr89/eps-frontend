sonar.projectKey=camilobr89_eps-frontend
sonar.organization=camilobr89
sonar.host.url=https://sonarcloud.io
sonar.branch.name=main

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/components/ui/**

sonar.coverage.exclusions=**/*.types.ts,**/*.d.ts,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,src/main.tsx,src/vite-env.d.ts

sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8